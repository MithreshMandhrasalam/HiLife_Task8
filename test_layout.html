<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial, sans-serif; background-color: #f0f0f0; color: #333; text-align: center; padding: 50px; }
div[id$="-section"] { background-color: white; padding: 20px; border: 1px solid #ccc; border-radius: 5px; max-width: 500px; margin: 0 auto; box-shadow: 2px 2px 5px gray; }
input[type="text"], input[type="password"], select { padding: 8px; font-size: 16px; margin: 5px; width: 90%; box-sizing: border-box; }
input[type="radio"], input[type="checkbox"] { margin-right: 10px; width: auto; }
.option-btn { display: block; width: 100%; text-align: left; background-color: #e9e9e9; color: black; margin-bottom: 10px; padding: 15px; }
</style>
</head>
<body>
  <div id="quiz-section">
    <label class="option-btn" style="cursor: pointer; display: block; box-sizing: border-box;">
      <input type="checkbox" name="questionOption" value="0" style="margin-right: 10px;">A. React
    </label>
  </div>
</body>
</html>
